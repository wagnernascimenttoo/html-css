<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1{ /*box-level*/
          background-color: lightblue;
          height: 300px;
          width: 300px;

          border-width:2px ;
          border-style:solid ;
          border-color: blue;

          /* border: 2px solid blue;  Atalho para definir a borda */

          /* padding: Atalho para definir o preenchimento */

          /* margin: Atalho para definir a margem */

          /*display: block; Ocupam toda a largura disponível e iniciam em uma nova linha.*/

          /* display: inlineblock; Ocupam toda a largura disponível, mas não iniciam em uma nova linha.*/

          padding-top: 10px;
          padding-bottom: 10px;
          padding-left: 10px;
          padding-right: 10px;

          /*margin:auto; Centraliza horizontalmente a sua margem */

          margin-top: 10px;
          margin-bottom: 10px;
          margin-left: auto;
          margin-right: auto; 

          outline-width: 2px;
          outline-style:dashed;
          outline-color: red;
            

        }
        a{/*in-line level*/

          display: block;
          width: 300px; 
          border-width:2px ;
          border-style:solid ;
          border-color: blue;

          padding-top: 2px;
          padding-bottom: 2px;
          padding-left: 2px;
          padding-right: 2px;
        }
    </style>
</head>
<body>
    <h1>Exemplos de caixas Box-level</h1>
    <p>Paragrafos também são elementos Box-level, mas os <a href="#"> links sao exemplos de caixas in-line level </a> Vamos ver como tudo isso funciona.</p>
</body>
</html>
