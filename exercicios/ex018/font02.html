<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Holiday';
            src: url(Cheerful\ Holiday.otf) format(opentype);
            font-weight: normal;
            font-style: normal;

            /* 
            Tipo de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype (eot)
            - truetype-aat (apple aadvanced typography)
            - svg (scalable vector graphics)
            */
        }
        body {
             font-family: 'Holiday', arial, verdana, sans-serif;
          
      }
      h1 {
             font-family: 'Holiday', cursive;
            font: size 3em;
            font-weight: normal;
            
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Blanditiis molestiae earum laboriosam laudantium deserunt veniam, quasi dolorum nemo voluptate ea. Illum ut debitis nam consequuntur quia iste, aperiam cumque dolores!</p>

</body>
</html>
