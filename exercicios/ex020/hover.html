<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de HOVER</title>
    <style>
body {
    font-family: Arial, sans-serif; 
}
div > p {
    display: none;
}
div:hover > p {
    display: block;
    color: red;
    background-color: black;

}
    

div {
    color: blue;
}
    </style>
</head>
<body>
    <H1>Exemplo de HOVER</H1>
    <p>
        Passe o mouse sobre o texto abaixo para ver a mudança de cor.
    </p>
    <div>
       Passe o mouse aqui!
       <p>TEXTO ESCONDIDO...</p>
    </div>
</body>
</html>
